<!-- templates/regulation_assessment/thank_you.html -->


{% extends 'base.html' %}
{% load static %}

{% block title %}تشکر از شما{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static './css/regulation_assessment_styles.css' %}">


    <div class="thank-you-container">
        <div class="success-icon">✓</div>
        <h1 class="thank-you-h1">درخواست شما ثبت شد!</h1>
        <p><span class="highlight">دانشجوی گرامی</span></p>
        <p class="thank-you-p">جهت استفاده از خدمات استارتاپ دیزاین</p>
        <p class="thank-you-p"><strong>به زودی با شما تماس می‌گیریم</strong></p>
        <a href="{% url 'regulation_assessment:evaluation_form' %}" class="back-button">بازگشت به صفحه اصلی</a>
    </div>
    
{% endblock %}


{% block extra_js %}
    <script src="{% static 'js/regulation_assessment_js/tooltip.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/steps.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/score.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/bylaw-select.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/testEstedad.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/upload.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/estedad.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/modal.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/proposals.js' %}"></script>
    <script src="{% static 'js/regulation_assessment_js/video.js' %}"></script>
{% endblock %}
